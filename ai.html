
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixo – Moliyaviy Nazorat</title>
<link rel="stylesheet" href="ai.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <h1>Pixo</h1>
    <p>Moliyaviy nazorat</p>
  </header>

  <!-- ── BALANCE CARD ── -->
  <div class="balance-card">
    <p>Jami balans</p>
    <h2 id="balance">0 so'm</h2>
    <div class="balance-meta">
      <span class="pos">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
        Daromad: <b id="totalIncome">0 so'm</b>
      </span>
      <span class="neg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
        Chiqim: <b id="totalExpense">0 so'm</b>
      </span>
    </div>
  </div>

  <!-- ── MAIN CONTAINER ── -->
  <div class="container">

    <!-- ADD -->
    <div class="card card-add">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        Qo'shish
      </h3>
      <select id="type">
        <option value="Daromad">💰 Daromad (+)</option>
        <option value="Qarz">📥 Olingan qarz (+)</option>
        <option value="Berilgan qarz">📤 Berilgan qarz (−)</option>
      </select>
      <input type="number" id="amount" placeholder="Summa (so'm)">
      <input type="text"   id="note"   placeholder="Izoh (ixtiyoriy)">
      <button class="save-btn" onclick="addRecord()">Saqlash</button>
    </div>

    <!-- AI -->
    <div class="card ai">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
          <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.14Z"/>
          <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.14Z"/>
        </svg>
        AI Tahlil · Pixo
      </h3>
      <div id="aiText">Hozircha jimman 🤖</div>
      <button class="analyze-btn" onclick="getAdvice()">Tahlil qil</button>
    </div>

    <!-- HISTORY -->
    <div class="card history">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Tarix
      </h3>
      <ul id="historyList"></ul>
      <button class="danger" onclick="clearHistory()">Tozalash</button>
    </div>

  </div>


  <!-- ══════════════════════════════
       NAVIGATION
  ══════════════════════════════ -->
  <div class="navigation">
    <ul id="navList">

      <!-- 1. Home -->
      <li class="list" onclick="setActive(this)">
        <a href="dashboard.html">
          <span class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M3 10l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8h-4v8H5a2 2 0 0 1-2-2z"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- 2. Stats (active) -->
      <li class="list active" onclick="setActive(this)">
        <a href="#">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="4"  y="10" width="3" height="8"  rx="1"/>
              <rect x="10" y="6"  width="3" height="12" rx="1"/>
              <rect x="16" y="3"  width="3" height="15" rx="1"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- 3. Mail -->
      <li class="list" onclick="setActive(this)">
        <a href="chat.html">
          <span class="icon">
            <!--
              viewBox kengaytirildi: 0 0 24 24 → 0 -1 24 26
              Shunday qilib rect(y=4) + polyline pastki qismi
              hech qachon kesilmaydi
            -->
            <svg viewBox="0 -1 24 26" fill="none">
              <rect x="2" y="3" width="20" height="17" rx="2"/>
              <polyline points="2,3 12,13 22,3"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- 4. Camera -->
      <li class="list" onclick="setActive(this)">
        <a href="rqc.html">
          <span class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- 5. Profile -->
      <li class="list" onclick="setActive(this)">
        <a href="profile.html">
          <span class="icon">
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
        </a>
      </li>

      <div class="indicator" id="indicator"></div>
    </ul>
  </div>

<script src="ai.js"></script>
</body>
</html>
