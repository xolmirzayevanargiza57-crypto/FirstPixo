
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixo – 4K Promptlar</title>
<link rel="stylesheet" href="prompt.css">
</head>
<body>
<div class="wrapper">

  <!-- TOP NAV -->
  <div class="top-nav">
    <div class="brand">
      <div class="brand-dot"></div>
      Pixo Prompt
    </div>
    <a href="dashboard.html" class="btn-home">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Asosiy Sahifa
    </a>
  </div>

  <!-- HEADER -->
  <header>
    <h1>4K Yuqori Darajali Promptlar</h1>
    <p class="subtitle">Rasmingiz uchun eng mos promptni tanlang, nusxa oling va Gemini yoki boshqa turdagi AI vositasiga yuboring</p>
    <div class="stats">
      <div class="stat">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <strong id="totalCount">150</strong> ta prompt
      </div>
      <div class="stat">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <strong>8</strong> ta kategoriya
      </div>
      <div class="stat">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <strong>4K</strong> Ultra HD
      </div>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Prompt qidiring... (masalan: portret, manzara, product)"/>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- RESULTS INFO -->
  <div class="results-info" id="resultsInfo"></div>

  <!-- GRID -->
  <div class="grid" id="grid">
    <div class="empty" id="empty" style="display:block; grid-column:1/-1">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>Hech narsa topilmadi</p>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar">
  <div class="selected-label" id="selectedLabel"></div>
  <button class="btn btn-ghost" onclick="clearSelection()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    Bekor
  </button>
  <button class="btn btn-primary" id="copyBtn" onclick="copyPrompt()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    Promptni Nusxalash
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  Prompt nusxalandi!
</div>

<script src="prompt.js"></script>
</body>
</html>
