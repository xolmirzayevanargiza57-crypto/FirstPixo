
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pixo Dragon Quest — Jang</title>
<link rel="stylesheet" href="dragon.css">
</head>
<body>

<div class="stars" id="stars"></div>

<div id="game">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-logo">🐉 PIXO DRAGON QUEST</div>
    <div class="area-badge" id="areaName">📍 Qorong'u O'rmon</div>
    <div class="energy-badge">⚡ <span id="topEnergy">0</span></div>
    <button class="btn-home-top" onclick="window.location.href='game.html'">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 6L6 1L11 6" stroke="#f0c040" stroke-width="1.2" stroke-linecap="round"/>
        <rect x="3" y="6" width="6" height="4.5" rx=".7" stroke="#f0c040" stroke-width="1" fill="none"/>
      </svg>
      ASOSIY SAHIFA
    </button>
  </div>

  <!-- ENERGY BAR -->
  <div class="battle-energy">
    <span class="be-label">⚡ ENERGIYA</span>
    <div class="be-track"><div class="be-fill" id="beFill" style="width:0%"></div></div>
    <span class="be-val" id="beVal">0/100</span>
  </div>

  <!-- SCENE -->
  <div class="scene" id="sceneBox">
    <div class="sc-stars"></div>
    <div class="moon"></div>
    <div class="mountains">
      <div class="m1"></div><div class="m2"></div>
      <div class="m3"></div><div class="m4"></div>
    </div>
    <div class="ground"></div>

    <!-- PLAYER SVG -->
    <div class="player-sprite" id="ps">
      <div class="defend-badge" id="db">🛡️</div>
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="47" width="8" height="8" rx="2" fill="#5a3a10"/>
        <rect x="30" y="47" width="8" height="8" rx="2" fill="#5a3a10"/>
        <rect x="20" y="37" width="7" height="13" rx="2" fill="#3a5090"/>
        <rect x="29" y="37" width="7" height="13" rx="2" fill="#3a5090"/>
        <rect x="15" y="22" width="26" height="18" rx="4" fill="#2a50c0"/>
        <rect x="18" y="24" width="20" height="14" rx="3" fill="#3060e0"/>
        <rect x="21" y="25" width="14" height="10" rx="2" fill="#4070f0"/>
        <line x1="28" y1="25" x2="28" y2="35" stroke="#2040a0" stroke-width="1.5"/>
        <rect x="10" y="22" width="8" height="7" rx="3" fill="#4070f0"/>
        <rect x="38" y="22" width="8" height="7" rx="3" fill="#4070f0"/>
        <rect x="10" y="28" width="7" height="12" rx="3" fill="#3060e0"/>
        <rect x="39" y="28" width="7" height="12" rx="3" fill="#3060e0"/>
        <rect x="9" y="39" width="8" height="5" rx="2" fill="#5a3a10"/>
        <rect x="39" y="39" width="8" height="5" rx="2" fill="#5a3a10"/>
        <line x1="44" y1="14" x2="44" y2="42" stroke="#c0c0d0" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="27" x2="48" y2="27" stroke="#c09020" stroke-width="2" stroke-linecap="round"/>
        <rect x="42" y="40" width="4" height="5" rx="1" fill="#8a6020"/>
        <ellipse cx="28" cy="16" rx="12" ry="13" fill="#2a50c0"/>
        <rect x="16" y="18" width="24" height="9" rx="2" fill="#3060e0"/>
        <rect x="19" y="18" width="18" height="6" rx="1" fill="#1a3080"/>
        <rect x="21" y="19.5" width="14" height="3" rx="1" fill="#2040a0"/>
        <rect x="22" y="20" width="5" height="2" rx="1" fill="#60c0ff" opacity=".9"/>
        <rect x="29" y="20" width="5" height="2" rx="1" fill="#60c0ff" opacity=".9"/>
        <path d="M20 8 Q28 2 36 8 Q32 13 28 11 Q24 13 20 8Z" fill="#e03030"/>
        <rect x="17" y="37" width="22" height="3" rx="1" fill="#8a6020"/>
        <rect x="25" y="36" width="6" height="4" rx="1" fill="#f0c040"/>
      </svg>
    </div>

    <!-- ENEMY — to'g'ridan-to'g'ri SVG -->
    <div class="enemy-sprite" id="es">
      <!-- default: goblin, JS orqali o'zgaradi -->
    </div>

    <div class="eff" id="eff"></div>
  </div>

  <!-- TURN BAR -->
  <div class="turn-bar">
    <div class="ti" id="pti">⚔️ SENING NAVBATING</div>
    <div class="tdots">
      <div class="td" id="td1"></div>
      <div class="td" id="td2"></div>
      <div class="td" id="td3"></div>
    </div>
    <div class="ti" id="eti">👹 DUSHMAN</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card pc">
      <div class="sn">
        <svg viewBox="0 0 15 15" fill="none">
          <circle cx="7.5" cy="4.5" r="2.8" fill="#4080ff"/>
          <rect x="4" y="8" width="7" height="6" rx="2" fill="#3060e0"/>
        </svg>
        <span id="pName">Qahramon</span>
        <span class="lvl" id="pLvl">⭐1</span>
      </div>
      <div class="br"><span class="bl">HP</span><div class="bt"><div class="bf hp-b" id="pHpB" style="width:100%"></div></div><span class="bv" id="pHpV">100/100</span></div>
      <div class="br"><span class="bl">MP</span><div class="bt"><div class="bf mp-b" id="pMpB" style="width:100%"></div></div><span class="bv" id="pMpV">50/50</span></div>
      <div class="br"><span class="bl">XP</span><div class="bt"><div class="bf xp-b" id="pXpB" style="width:0%"></div></div><span class="bv" id="pXpV">0/100</span></div>
    </div>
    <div class="stat-card ec">
      <div class="sn">
        <svg viewBox="0 0 15 15" fill="none">
          <ellipse cx="7.5" cy="9" rx="5" ry="4" fill="#c03030"/>
          <circle cx="7.5" cy="5.5" r="3.2" fill="#c03030"/>
          <circle cx="6" cy="5" r="1" fill="#ffe000"/>
          <circle cx="9" cy="5" r="1" fill="#ffe000"/>
        </svg>
        <span id="eName">Goblin</span>
        <span class="lvl" id="eLvl" style="color:#ff8080;border-color:rgba(224,48,48,.4)">💀1</span>
      </div>
      <div class="br"><span class="bl">HP</span><div class="bt"><div class="bf hp-b" id="eHpB" style="width:100%"></div></div><span class="bv" id="eHpV">60/60</span></div>
      <div class="br"><span class="bl">KCH</span><div class="bt"><div class="bf" id="ePwB" style="width:40%;background:linear-gradient(90deg,#a03020,#e05030)"></div></div><span class="bv" id="ePwV">12</span></div>
      <div style="font-size:.58rem;color:var(--dim);margin-top:4px;" id="eDesc">Yovuz yirtqich</div>
    </div>
  </div>

  <!-- LOG -->
  <div class="battle-log" id="log">
    <div class="ll ls">⚔️ Jang boshlandi!</div>
  </div>

  <!-- ACTION BUTTONS — 2x2 katta -->
  <div class="actions">
    <button class="ab ba" id="bA" onclick="act('attack')">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M6 26 L22 10" stroke="#e06030" stroke-width="3" stroke-linecap="round"/>
        <path d="M22 10 L25 6 L26 7 L22 10Z" fill="#f0c040"/>
        <path d="M8 24 L6 26 L8 26 L8 24Z" fill="#8a6020"/>
        <line x1="16" y1="16" x2="19" y2="19" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="bn" style="color:#ff9060">HUJUM</span>
      <span class="bi">15-25 zarar</span>
    </button>

    <button class="ab bm" id="bM" onclick="act('magic')">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="7" fill="none" stroke="#9040e0" stroke-width="2"/>
        <circle cx="16" cy="16" r="3" fill="#9040e0" opacity=".6"/>
        <line x1="16" y1="4" x2="16" y2="9" stroke="#c080ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="23" x2="16" y2="28" stroke="#c080ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="4" y1="16" x2="9" y2="16" stroke="#c080ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="23" y1="16" x2="28" y2="16" stroke="#c080ff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="2" fill="#c080ff"/>
      </svg>
      <span class="bn" style="color:#c080ff">SEHR</span>
      <span class="bi" id="mInfo">30-40 | 20MP</span>
    </button>

    <button class="ab bh" id="bH" onclick="act('heal')">
      <svg viewBox="0 0 32 32" fill="none">
        <rect x="13" y="6" width="6" height="20" rx="3" fill="#30c060"/>
        <rect x="6" y="13" width="20" height="6" rx="3" fill="#30c060"/>
        <circle cx="16" cy="16" r="5" fill="#60e090" opacity=".3"/>
      </svg>
      <span class="bn" style="color:#60e090">DAVOLASH</span>
      <span class="bi" id="hInfo">+30-45 | 15MP</span>
    </button>

    <button class="ab bd" id="bD" onclick="act('defend')">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 4L25 8L25 18Q25 26 16 30Q7 26 7 18L7 8Z" fill="#2040a0" stroke="#4080ff" stroke-width="1.5"/>
        <path d="M16 9L21 13L21 19Q21 23 16 26Q11 23 11 19L11 13Z" fill="#3050c0"/>
        <line x1="16" y1="12" x2="16" y2="23" stroke="#60a0ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="11" y1="17" x2="21" y2="17" stroke="#60a0ff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="bn" style="color:#80b0ff">HIMOYA</span>
      <span class="bi">Zarar -50%</span>
    </button>
  </div>

  <!-- KEYBOARD HINT (faqat desktop) -->
  <div class="kb-hint">
    <span class="kh">A — Hujum</span>
    <span class="kh">S — Sehr</span>
    <span class="kh">D — Davolash</span>
    <span class="kh">F — Himoya</span>
  </div>

</div>

<!-- RESULT -->
<div id="resultOv">
  <div class="rb">
    <div style="font-size:3.5rem;margin-bottom:10px;" id="rIcon"></div>
    <div class="rt" id="rTitle"></div>
    <div class="rs" id="rSub"></div>
    <div class="rrew" id="rRew"></div>
    <div class="rbtns">
      <button class="btn-nr" id="rBtn" onclick="nextBattle()">⚔️ DAVOM ETISH</button>
      <button class="btn-hm" onclick="window.location.href='game.html'">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 6.5L6.5 1L12 6.5" stroke="#f0c040" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="3.5" y="6.5" width="6" height="4.5" rx=".7" stroke="#f0c040" stroke-width="1" fill="none"/>
        </svg>
        ASOSIY SAHIFA
      </button>
    </div>
  </div>
</div>

<script src="dragon.js"></script>
</body>
</html>
