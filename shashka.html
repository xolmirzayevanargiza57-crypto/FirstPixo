
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pixo SHASHKA</title>
<link rel="stylesheet" href="shashka.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="game-wrapper">

  <!-- Sarlavha -->
  <div class="title-bar">
    <div class="title-line"></div>
    <div class="title-text">KIBER SHASHKA</div>
    <div class="title-line r"></div>
  </div>

  <!-- Tugmalar -->
  <div class="top-bar">

    <!-- Bosh sahifa -->
    <button class="icon-btn btn-home" onclick="goHome()" title="Bosh sahifa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12L12 4l9 8"/>
        <path d="M5 10v9h5v-5h4v5h5v-9"/>
      </svg>
      BOSH SAHIFA
    </button>

    <!-- Qayta boshlash -->
    <button class="icon-btn btn-restart" onclick="restartGame()" title="Qayta boshlash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 2v6h6"/>
        <path d="M3 8A9 9 0 1 1 5.6 18.4"/>
      </svg>
      YANGILASH
    </button>

    <!-- Ovoz -->
    <button class="icon-btn" onclick="toggleSound()" id="soundBtn" title="Ovoz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" id="soundSvg">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      OVOZ
    </button>

  </div>

  <!-- Hisob paneli -->
  <div class="score-row">
    <div class="player-panel red active" id="panelRed">
      <div class="player-name">▸ 1-O'YINCHI</div>
      <div class="player-score" id="scoreRed">12</div>
      <div class="player-label">DONA QOLDI</div>
      <div class="turn-indicator show" id="turnRed">
        <div class="turn-dot"></div>SIZNING NAVBAT
      </div>
    </div>

    <div class="vs-divider">
      <div class="vs-text">VS</div>
      <div class="vs-line"></div>
    </div>

    <div class="player-panel black" id="panelBlack">
      <div class="player-name">▸ 2-O'YINCHI</div>
      <div class="player-score" id="scoreBlack">12</div>
      <div class="player-label">DONA QOLDI</div>
      <div class="turn-indicator" id="turnBlack">
        <div class="turn-dot"></div>SIZNING NAVBAT
      </div>
    </div>
  </div>

  <!-- Taxtа -->
  <div class="board-container">
    <div class="board-inner">
      <div class="board" id="board"></div>
      <div class="e-line"></div>
    </div>
  </div>

  <!-- Holat -->
  <div class="status-bar" id="statusBar">1-O'YINCHI — YURING</div>

</div>

<!-- G'alaba ekrani -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="win-trophy">🏆</div>
    <div class="win-title" id="winTitle">1-O'YINCHI G'OLIB!</div>
    <div class="win-sub" id="winSub">TABRIKLAYMIZ — KIBER CHEMPION</div>
    <div class="win-btns">
      <button class="win-btn green" onclick="restartGame()">▸ QAYTA O'YNASH</button>
      <button class="win-btn" onclick="goHome()">⌂ BOSH SAHIFA</button>
    </div>
  </div>
</div>

<!-- Toast xabari -->
<div class="toast" id="toast"></div>

<script src="shashka.js"></script>
</body>
</html>
