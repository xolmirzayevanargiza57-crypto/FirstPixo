<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pixo Kundalik</title>
    <link rel="stylesheet" href="kundalik.css">
</head>

<body>
    <svg style="position:absolute;width:0;height:0">
        <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#00c6ff" />
                <stop offset="50%" stop-color="#0072ff" />
                <stop offset="100%" stop-color="#a855f7" />
            </linearGradient>
        </defs>
    </svg>

    <div class="toast" id="toast"></div>

    </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="switchView('daily',this)">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            Kunlik
        </div>
        <div class="tab" onclick="switchView('weekly',this)">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
                <line x1="8" y1="14" x2="16" y2="14" />
            </svg>
            Haftalik
        </div>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <div class="stat-icon-wrap blue">
                <svg viewBox="0 0 24 24">
                    <path d="M9 11l3 3L22 4" />
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
                </svg>
            </div>
            <div class="stat-num blue" id="statTotal">0</div>
            <div class="stat-label">Jami</div>
        </div>
        <div class="stat">
            <div class="stat-icon-wrap green">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
            <div class="stat-num green" id="statDone">0</div>
            <div class="stat-label">Bajarildi</div>
        </div>
        <div class="stat">
            <div class="stat-icon-wrap red">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </div>
            <div class="stat-num red" id="statLeft">0</div>
            <div class="stat-label">Qoldi</div>
        </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap">
        <div class="progress-label">
            <span style="display:flex;align-items:center;gap:5px;">
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
                Bugungi progress
            </span>
            <span id="progressPct">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>

    <!-- ADD BTN -->
    <button class="add-btn" onclick="openModal()">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
        Yangi vazifa qo'shish
    </button>

    <a style="text-decoration: none;" href="dashboard.html"><button class="add-btn">
            Asosiy Sahifa
        </button>
    </a>

    <!-- FILTERS -->
    <div class="filters">
        <div class="filter-chip active" onclick="setFilter('all',this)">
            <svg viewBox="0 0 24 24">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Barchasi
        </div>
        <div class="filter-chip" onclick="setFilter('high',this)">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
            </svg>
            Muhim
        </div>
        <div class="filter-chip" onclick="setFilter('mid',this)">
            <svg viewBox="0 0 24 24">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
            O'rta
        </div>
        <div class="filter-chip" onclick="setFilter('low',this)">
            <svg viewBox="0 0 24 24">
                <path d="M18 15l-6-6-6 6" />
            </svg>
            Past
        </div>
        <div class="filter-chip" onclick="setFilter('done',this)">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            Bajarilgan
        </div>
        <div class="filter-chip" onclick="setFilter('overdue',this)">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Muddati o'tgan
        </div>
    </div>

    <!-- VIEWS -->
    <div id="dailyView">
        <div id="taskList"></div>
    </div>
    <div id="weeklyView" style="display:none">
        <div class="week-grid" id="weekGrid"></div>
        <div id="weekTaskList"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    Yangi vazifa
                </div>
                <div class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 24 24">
                        <line x1="17" y1="10" x2="3" y2="10" />
                        <line x1="21" y1="6" x2="3" y2="6" />
                        <line x1="21" y1="14" x2="3" y2="14" />
                        <line x1="17" y1="18" x2="3" y2="18" />
                    </svg>
                    Vazifa nomi
                </label>
                <input class="form-input" id="taskName" placeholder="Nima qilish kerak?" />
            </div>

            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                    </svg>
                    Tavsif (ixtiyoriy)
                </label>
                <input class="form-input" id="taskDesc" placeholder="Qo'shimcha ma'lumot..." />
            </div>

            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Deadline
                </label>
                <input class="form-input" type="datetime-local" id="taskDeadline" />
            </div>

            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                    </svg>
                    Muhimlik darajasi
                </label>
                <div class="priority-grid">
                    <div class="priority-opt" id="p-high" onclick="selectPriority('high')">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                        </svg>
                        Yuqori
                    </div>
                    <div class="priority-opt selected-mid" id="p-mid" onclick="selectPriority('mid')">
                        <svg viewBox="0 0 24 24">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                        </svg>
                        O'rta
                    </div>
                    <div class="priority-opt" id="p-low" onclick="selectPriority('low')">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
                            <path d="M8 12h8" />
                        </svg>
                        Past
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 01-3.46 0" />
                    </svg>
                    Eslatma
                </label>
                <div class="reminder-grid">
                    <div class="reminder-opt" id="r-15" onclick="selectReminder('15')">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        15 daq oldin
                    </div>
                    <div class="reminder-opt" id="r-30" onclick="selectReminder('30')">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        30 daq oldin
                    </div>
                    <div class="reminder-opt" id="r-60" onclick="selectReminder('60')">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        1 soat oldin
                    </div>
                    <div class="reminder-opt" id="r-1440" onclick="selectReminder('1440')">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg>
                        1 kun oldin
                    </div>
                </div>
            </div>

            <button class="modal-submit" onclick="saveTask()">
                <svg viewBox="0 0 24 24">
                    <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                    <polyline points="17 21 17 13 7 13 7 21" />
                    <polyline points="7 3 7 8 15 8" />
                </svg>
                Saqlash
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="kundalik.js"></script>
</body>

</html>
