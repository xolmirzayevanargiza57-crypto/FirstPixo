
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pixo Timer</title>
<link rel="stylesheet" href="time.css">
</head>
<body class="bg-tabiat">

<div class="bg-img" id="bgImg"></div>
<div class="bg-overlay"></div>
<canvas id="rainCanvas"></canvas>
<div class="particles" id="particles"></div>

<div class="page">
 <div class="card">

  <div class="top-nav">
   <a class="back-btn" href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
   </a>
   <div class="nav-title">Timer</div>
   <div class="nav-spacer"></div>
  </div>

  <div class="header">
   <div class="app-title">PIXO TIMER</div>
   <div class="app-sub">Mahsuldorlik Taymeri</div>
  </div>

  <div class="tabs">
   <button class="tab active" onclick="setMode('focus',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    Fokus
   </button>
   <button class="tab" onclick="setMode('break',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
    Tanaffus
   </button>
  </div>

  <div class="sec" id="focusSec">
   <span class="sec-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Fokus vaqti
   </span>
   <div class="time-row">
    <button class="tbtn" onclick="setFocus(10,this)">10 daq</button>
    <button class="tbtn active" onclick="setFocus(25,this)">25 daq</button>
    <button class="tbtn" onclick="setFocus(50,this)">50 daq</button>
   </div>
  </div>

  <div class="sec" id="breakSec" style="display:none">
   <span class="sec-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/></svg>
    Tanaffus vaqti
   </span>
   <div class="time-row">
    <button class="tbtn active" onclick="setBreak(5,this)">5 daq</button>
    <button class="tbtn" onclick="setBreak(10,this)">10 daq</button>
    <button class="tbtn" onclick="setBreak(25,this)">25 daq</button>
   </div>
  </div>

  <div class="timer-wrap">
   <div class="ring"></div><div class="ring"></div>
   <svg class="progress-svg" viewBox="0 0 212 212">
    <circle class="prog" id="prog" cx="106" cy="106" r="100"/>
   </svg>
   <div class="timer-face" id="face">
    <div class="nums" id="nums">25:00</div>
    <div class="mode-lbl" id="mlbl">TAYYOR</div>
   </div>
  </div>

  <div class="status">
   <span class="badge" id="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    Boshlashga tayyor
   </span>
  </div>

  <div class="ctrls">
   <button class="cbtn c-start" id="btnStart" onclick="startTimer()">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Boshlash
   </button>
   <button class="cbtn c-pause" id="btnPause" onclick="pauseTimer()" style="display:none">
    <svg viewBox="0 0 24 24" fill="currentColor" id="pauseIcon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    <span id="pauseLabel">Pauza</span>
   </button>
   <button class="cbtn c-stop" onclick="stopTimer()">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    To'xtatish
   </button>
  </div>

  <div class="sound-row">
   <div class="sound-info">
    <div class="sound-icon active" id="soundIcon">
     <svg id="soundIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
     </svg>
    </div>
    <div>
     <div class="sound-title" id="soundTitle">Sanash ovozi yoqilgan</div>
     <div class="sound-sub" id="soundSub">Har soniyada chiqilloq eshitiladi</div>
    </div>
   </div>
   <div class="toggle-wrap">
    <span class="toggle-label-text on" id="toggleText">YOQ</span>
    <div class="toggle active" id="soundToggle" onclick="toggleSound()">
     <div class="toggle-thumb"></div>
    </div>
   </div>
  </div>
  <div class="volume-row" id="volumeRow">
   <svg class="vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
   <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="70" oninput="updateVolume(this.value)">
   <span class="vol-val" id="volVal">70%</span>
  </div>

  <div class="divider"></div>

  <div class="sessions">
   <span class="s-lbl">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Sessiyalar
   </span>
   <div class="dots">
    <div class="dot" id="d1"></div><div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div><div class="dot" id="d4"></div>
   </div>
  </div>

  <div class="divider"></div>

  <div class="sec">
   <span class="sec-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    Fon tanlash
   </span>
   <div class="bg-grid" id="bgGrid"></div>
  </div>

  <a class="dash-btn" href="dashboard.html">
   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
   </svg>
   Asosiy sahifaga qaytish
  </a>

 </div>
</div>

<script src="time.js"></script>
</body>
</html>
