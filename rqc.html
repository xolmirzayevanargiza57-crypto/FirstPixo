
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixo Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="rqc.css">
</head>
<body>

<div class="wrapper">

  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <!-- SVG QR Code icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="9" x2="15" y2="15"></line>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <circle cx="9" cy="9" r="1" fill="white"></circle>
          <circle cx="15" cy="15" r="1" fill="white"></circle>
        </svg>
      </div>
      <span class="logo-text">Pixo Scanner</span>
    </div>
    <p class="tagline">Kamera orqali skaner qiling</p>
  </header>

  <div class="card">
    <!-- Scanner viewport -->
    <div class="scanner-wrap" id="scanner-wrap">
      <div id="reader"></div>

      <!-- Idle placeholder -->
      <div class="idle-placeholder" id="idle-placeholder">
        <div class="qr-frame"><span></span></div>
        <p class="idle-hint">Kamerani yoqing va<br>QR kodni skaner qiling</p>
      </div>

      <!-- Scan overlay (shown while camera active) -->
      <div class="scan-overlay" id="scan-overlay">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line"></div>
      </div>

      <!-- Success flash -->
      <div class="success-flash" id="success-flash"></div>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <div class="status-dot"></div>
      <span id="status-text">Tayyor</span>
    </div>

    <!-- Buttons -->
    <div class="controls">
      <button class="btn btn-primary" id="btn-camera" onclick="toggleCamera()">
        <!-- SVG Camera icon -->
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Kamerani yoqish
      </button>
    </div>
  </div>

</div>

<!-- Result Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon">
      <!-- SVG icons will be injected via JS based on type -->
    </div>
    <p class="modal-label" id="modal-label"></p>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-content" id="modal-content"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

 <!-- NAVIGATION -->
  <div class="navigation">
    <ul>
      <li class="list">
        <a href="dashboard.html">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8h-4v8H5a2 2 0 0 1-2-2z" />
            </svg>
          </span>
        </a>
      </li>
      <li class="list">
        <a href="ai.html">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="4"  y="10" width="3" height="8"  rx="1"/>
              <rect x="10" y="6"  width="3" height="12" rx="1"/>
              <rect x="16" y="3"  width="3" height="15" rx="1"/>
            </svg>
          </span>
        </a>
      </li>
      <li class="list">
        <a href="chat.html">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </span>
        </a>
      </li>
      <li class="list active">
        <a href="#">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
          </span>
        </a>
      </li>
      <li class="list">
        <a href="profile.html">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
        </a>
      </li>
      <div class="indicator"></div>
    </ul>
  </div>

<script src="rqc.js"></script>
</body>
</html>
