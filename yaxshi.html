
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixo AI</title>
  <link rel="stylesheet" href="yaxshi.css">
</head>
<body>

<!-- HEADER -->
<header class="top">
  <button class="hamburger" id="hamburger">
    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="title">Pixo AI <span class="title-dot"></span></div>
  <span class="model-badge">Pixo + Code</span>
</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxRename">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Nomini o'zgartir
  </div>
  <div class="ctx-item danger" id="ctxDelete">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    O'chirish
  </div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <div class="menu-top">
    <div class="menu-header">
      <div class="menu-logo">Pixo AI</div>
      <button id="closeModal2">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <a href="dashboard.html" style="text-decoration:none">
      <button class="menu-btn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Asosiy sahifa
      </button>
    </a>

    <button class="menu-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/>
      </svg>
      Yangi Chat
    </button>
  </div>

  <!-- HISTORY -->
  <div class="history-list" id="historyList">
    <div class="history-label">
      Chatlar tarixi
      <span class="history-clear-all" onclick="clearAllChats()">Hammasini o'chir</span>
    </div>
    <div id="historyItems"></div>
  </div>

  <!-- BOTTOM -->
  <div class="menu-bottom">
    <div class="menu-section-label">Sozlamalar</div>
    <div class="theme-row">
      <div class="theme-label">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        Yorug' rejim
      </div>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">✦</div>
    <h2>Pixo AI</h2>
    <p>Savol bering, rasm yuboring yoki mikrofon orqali gaplashing</p>
  </div>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <div class="image-preview" id="imagePreview">
    <img id="previewImg" src="" alt="preview"/>
    <span class="image-preview-name" id="previewName"></span>
    <button class="image-preview-remove" onclick="removeImage()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="input-row">
    <div class="input-wrap">
      <textarea id="input" placeholder="Savol yozing..." rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      ></textarea>
      <div class="input-actions">
        <button class="action-btn" onclick="document.getElementById('fileInput').click()" title="Rasm yuklash">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <button class="action-btn" id="micBtn" onclick="toggleMic()" title="Mikrofon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>
    </div>
    <button class="send" onclick="send()">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter — yuborish &nbsp;·&nbsp; Shift+Enter — yangi qator</div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(event)"/>

<script src="yaxshi.js"></script>
</body>
</html>
