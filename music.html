
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Music Player</title>
<link rel="stylesheet" href="music.css">
</head>
<body>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-header">
    <div>
      <h2>Playlist</h2>
      <small id="track-count">0 tracks</small>
    </div>
    <button class="icon-btn" id="close-sb">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 18 18" fill="none">
      <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2"/>
      <path d="M13 13l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input class="search-input" id="search-input" placeholder="Qidirish..." autocomplete="off"/>
    <button class="search-clear" id="search-clear">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- HOME BTN — search-wrap TASHQARIDA -->
  <a href="dashboard.html" class="home-link">
    <button class="home-btn">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M7 18v-6h6v6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      Asosiy Sahifa
    </button>
  </a>

  <div class="track-list" id="track-list">
    <div class="no-tracks" id="no-tracks">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="16" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path d="M14 12v12M14 12l9 6-9 6V12z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <p>Musiqa yo'q</p>
    </div>
  </div>
</div>

<img style="position: absolute;z-index: 10;margin-bottom: 330px;border-radius:10px;" src="music.png" alt="">
<!-- CARD -->
<div class="card">
  <div class="glow glow-t"></div>
  <div class="glow glow-b"></div>

  <div class="header">
    <span class="label">Now Playing</span>
    <div class="hbtns">
      <button class="icon-btn" id="menu-btn">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <rect width="18" height="2" rx="1" fill="currentColor"/>
          <rect x="4" y="6" width="14" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="12" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- VISUALIZER -->
  <div class="viz" id="viz"></div>

  <!-- TRACK INFO -->
  <div class="track-info">
    <div class="track-title" id="track-title">Musiqa tanlanmagan</div>
    <div class="track-artist" id="track-artist">Playlist dan tanlang</div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar">
      <div class="prog-fill" id="prog-fill">
        <div class="prog-thumb"></div>
      </div>
    </div>
    <div class="times">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="tog-btn" id="shuffle-btn">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <path d="M1 1h3l9 12h4M13 1h4v3M17 1l-5 6M1 13h3l3-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13 13h4v-3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="prev-btn">
      <svg width="18" height="16" viewBox="0 0 18 16" fill="none">
        <path d="M17 1v14M1 8l10-7v14L1 8z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="play-btn" id="play-btn" disabled>
      <svg id="ico-play" width="20" height="22" viewBox="0 0 20 22" fill="none">
        <path d="M2 2l16 9L2 20V2z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <svg id="ico-pause" width="18" height="22" viewBox="0 0 18 22" fill="none" style="display:none">
        <rect x="1" y="1" width="5" height="20" rx="2" fill="currentColor"/>
        <rect x="12" y="1" width="5" height="20" rx="2" fill="currentColor"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="next-btn">
      <svg width="18" height="16" viewBox="0 0 18 16" fill="none">
        <path d="M1 1v14M17 8L7 1v14l10-7z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="tog-btn" id="repeat-btn">
      <svg width="18" height="16" viewBox="0 0 18 16" fill="none">
        <path d="M3 2h12a2 2 0 012 2v4M15 14H3a2 2 0 01-2-2V8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M13 0l4 2-4 2M5 16l-4-2 4-2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- VOLUME -->
  <div class="vol-row">
    <button class="vol-btn" id="mute-btn">
      <svg id="v-high" width="20" height="16" viewBox="0 0 20 16" fill="none">
        <path d="M1 5h3l5-4v14L4 11H1V5z" fill="currentColor"/>
        <path d="M13 2a7 7 0 010 12M11 4.5a4 4 0 010 7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <svg id="v-low" width="20" height="16" viewBox="0 0 20 16" fill="none" style="display:none">
        <path d="M1 5h3l5-4v14L4 11H1V5z" fill="currentColor"/>
        <path d="M13 4.5a4 4 0 010 7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <svg id="v-mute" width="20" height="16" viewBox="0 0 20 16" fill="none" style="display:none">
        <path d="M1 5h3l5-4v14L4 11H1V5z" fill="currentColor"/>
        <path d="M16 4l-4 8M12 4l4 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="vol-track">
      <div class="vol-fill" id="vol-fill" style="width:80%"></div>
      <input type="range" class="vol-input" id="vol-input" min="0" max="1" step="0.01" value="0.8"/>
    </div>
  </div>
</div>

<script src="music.js"></script>
</body>
</html>
